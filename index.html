<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衣装カタログ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4df;
    --text: #1a1814;
    --text-muted: #8a8580;
    --accent: #2c2420;
    --tag-bg: #f0ece6;
    --tag-text: #5a5248;
    --shadow: 0 2px 20px rgba(0,0,0,0.06);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ヘッダー */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .site-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .site-title span {
    font-style: italic;
    font-weight: 300;
    margin-right: 6px;
    opacity: 0.5;
    font-size: 16px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .last-updated {
    font-size: 12px;
    color: var(--text-muted);
  }
  .reload-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
  }
  .reload-btn:hover { background: var(--tag-bg); color: var(--text); }
  .reload-icon { font-size: 14px; }
  .reload-btn.loading .reload-icon { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* メイン */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* カテゴリーボタン */
  .cat-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .cat-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 400;
    padding: 14px 28px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 100px;
  }
  .cat-btn .cat-count {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.7;
  }
  .cat-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(44,36,32,0.25);
  }
  .cat-btn.active .cat-count { color: rgba(255,255,255,0.7); opacity: 1; }

  /* 検索バー */
  .search-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    box-shadow: var(--shadow);
  }
  .search-input-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-input-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
    min-width: 120px;
    transition: border-color .2s;
  }
  .filter-select:focus { border-color: var(--accent); }
  .result-count {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-left: auto;
  }

  /* グリッド */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* カード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    box-shadow: var(--shadow);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    border-color: #c8c0b8;
  }
  .card-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--tag-bg);
  }
  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--tag-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
  }
  .card-body {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
  }
  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--tag-text);
  }
  .tag-cat { background: #ede8f5; color: #5a4d7a; }
  .tag-size { background: #e6f0fa; color: #2d5a8a; }

  .state-box {
    grid-column: 1/-1;
    text-align: center;
    padding: 5rem 0;
    color: var(--text-muted);
  }
  .state-box p { margin-top: 12px; font-size: 14px; }

  .error-bar {
    background: #fdf2f2;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #c0392b;
    margin-bottom: 1rem;
    display: none;
  }
  .error-bar.show { display: block; }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,16,12,.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    width: 680px;
    max-width: 96vw;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: scale(.96) translateY(8px); } }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,.35);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background .2s;
  }
  .modal-close:hover { background: rgba(0,0,0,.55); }
  .modal-img {
    width: 100%;
    max-height: 520px;
    object-fit: cover;
    display: block;
    border-radius: 16px 16px 0 0;
    background: var(--tag-bg);
  }
  .modal-img-placeholder {
    width: 100%;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    background: var(--tag-bg);
    border-radius: 16px 16px 0 0;
  }
  .modal-body { padding: 1.5rem; }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .modal-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-label { color: var(--text-muted); font-size: 12px; }
  .modal-value { color: var(--text); }
  .modal-note { margin-top: 12px; font-size: 13px; color: var(--text-muted); line-height: 1.7; }

  @media (max-width: 600px) {
    .site-header { padding: 0 1rem; }
    .main { padding: 1.5rem 1rem; }
    .cat-btn { padding: 12px 20px; font-size: 14px; min-width: 80px; }
    .search-bar { padding: 1rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title"><span>studio</span>衣装カタログ</div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="reload-btn" onclick="loadData()" id="reloadBtn">
      <span class="reload-icon">↻</span> 更新
    </button>
  </div>
</header>

<main class="main">
  <div class="error-bar" id="errorBar">データの読み込みに失敗しました。スプレッドシートの公開設定を確認して「更新」を押してください。</div>

  <!-- カテゴリーボタン -->
  <div class="cat-buttons" id="catButtons"></div>

  <!-- 検索・絞り込み -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search" placeholder="衣装名・メモで検索...">
    </div>
    <select class="filter-select" id="filterColor"><option value="">すべての色</option></select>
    <select class="filter-select" id="filterSize">
      <option value="">すべてのサイズ</option>
      <option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
    </select>
    <span class="result-count" id="count"></span>
  </div>

  <div class="grid" id="grid">
    <div class="state-box">
      <div style="font-size:32px">⟳</div>
      <p>データを読み込んでいます...</p>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToP4c_J75zU6vHUGfGBA3Rrplx9sy3t5XlKEl4Dw7CyyUZMlPxYGEs613U9NrcSd55D5bMujG4CKgx/pub?gid=0&single=true&output=csv';
let items = [];
let selectedCat = 'すべて';

function driveUrl(url) {
  if (!url) return '';
  const m = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  // すでにlh3形式の場合はそのまま
  if (url.includes('lh3.googleusercontent.com')) return url;
  return url;
}

function splitLine(line) {
  const vals = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
    else cur += c;
  }
  vals.push(cur);
  return vals.map(v => v.trim().replace(/^"|"$/g, ''));
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function normalize(row) {
  return {
    name:  row['名前'] || row['name'] || '',
    cat:   row['カテゴリー'] || row['カテゴリ'] || row['category'] || '',
    color: row['色'] || row['color'] || '',
    size:  row['サイズ'] || row['size'] || '',
    note:  row['メモ'] || row['note'] || '',
    photo: driveUrl(row['写真'] || row['photo'] || row['画像URL'] || '')
  };
}

async function loadData() {
  const btn = document.getElementById('reloadBtn');
  btn.classList.add('loading');
  document.getElementById('errorBar').classList.remove('show');
  document.getElementById('lastUpdated').textContent = '';
  document.getElementById('grid').innerHTML = '<div class="state-box"><div style="font-size:32px">⟳</div><p>読み込み中...</p></div>';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    items = parseCSV(text).map(normalize).filter(r => r.name);
    buildCatButtons();
    buildColorFilter();
    render();
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 更新 • ${items.length}件`;
  } catch (e) {
    document.getElementById('errorBar').classList.add('show');
    document.getElementById('grid').innerHTML = '';
  } finally {
    btn.classList.remove('loading');
  }
}

function buildCatButtons() {
  const cats = [...new Set(items.map(i => i.cat).filter(Boolean))];
  const allCats = ['すべて', ...cats];
  const wrap = document.getElementById('catButtons');
  wrap.innerHTML = allCats.map(c => {
    const count = c === 'すべて' ? items.length : items.filter(i => i.cat === c).length;
    const active = selectedCat === c ? ' active' : '';
    return `<button class="cat-btn${active}" onclick="selectCat('${esc(c)}')">
      ${esc(c)}
      <span class="cat-count">${count}点</span>
    </button>`;
  }).join('');
}

function selectCat(cat) {
  selectedCat = cat;
  buildCatButtons();
  render();
}

function buildColorFilter() {
  const colors = [...new Set(items.map(i => i.color).filter(Boolean))];
  document.getElementById('filterColor').innerHTML =
    '<option value="">すべての色</option>' + colors.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const fcol = document.getElementById('filterColor').value;
  const fs = document.getElementById('filterSize').value;
  const filtered = items.filter(i => {
    if (selectedCat !== 'すべて' && i.cat !== selectedCat) return false;
    if (q && !(i.name.toLowerCase().includes(q) || (i.note||'').toLowerCase().includes(q))) return false;
    if (fcol && i.color !== fcol) return false;
    if (fs && i.size !== fs) return false;
    return true;
  });
  document.getElementById('count').textContent = filtered.length + '件';
  const g = document.getElementById('grid');
  if (!filtered.length) {
    g.innerHTML = '<div class="state-box"><div style="font-size:32px">🔍</div><p>該当する衣装がありません</p></div>';
    return;
  }
  g.innerHTML = filtered.map(i => {
    const idx = items.indexOf(i);
    const thumbHtml = i.photo
      ? `<img class="card-thumb" src="${esc(i.photo)}" alt="${esc(i.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-thumb-placeholder" style="display:none">👗</div>`
      : `<div class="card-thumb-placeholder">👗</div>`;
    return `<div class="card" onclick="openDetail(${idx})">
      ${thumbHtml}
      <div class="card-body">
        <div class="card-name">${esc(i.name)}</div>
        <div class="card-tags">
          ${i.size  ? `<span class="tag tag-size">${esc(i.size)}</span>` : ''}
          ${i.color ? `<span class="tag">${esc(i.color)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openDetail(idx) {
  const i = items[idx]; if (!i) return;
  const imgHtml = i.photo
    ? `<img class="modal-img" src="${esc(i.photo)}" alt="${esc(i.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="modal-img-placeholder" style="display:none">👗</div>`
    : `<div class="modal-img-placeholder">👗</div>`;
  document.getElementById('modalContent').innerHTML = `
    ${imgHtml}
    <div class="modal-body">
      <div class="modal-title">${esc(i.name)}</div>
      ${i.cat   ? `<div class="modal-row"><span class="modal-label">カテゴリー</span><span class="modal-value">${esc(i.cat)}</span></div>` : ''}
      ${i.color ? `<div class="modal-row"><span class="modal-label">色</span><span class="modal-value">${esc(i.color)}</span></div>` : ''}
      ${i.size  ? `<div class="modal-row"><span class="modal-label">サイズ</span><span class="modal-value">${esc(i.size)}</span></div>` : ''}
      ${i.note  ? `<div class="modal-note">${esc(i.note)}</div>` : ''}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterColor').addEventListener('change', render);
document.getElementById('filterSize').addEventListener('change', render);

loadData();
</script>
</body>
</html>
